spring:
  application:
    name: reconciliation-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/reconciliation_dev}
    username: ${DB_USERNAME:recon_user}
    password: ${DB_PASSWORD:recon_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC
  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  tomcat:
    accept-count: 200
    max-connections: 10000

db-scheduler:
  enabled: true
  threads: 5
  polling-interval: 10s
  heartbeat-interval: 5m
  table-name: scheduled_tasks

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  merchant:
    id: ${MERCHANT_ID:merchant_001}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:secret_placeholder}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:razorpay_webhook_secret}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  reconciliation:
    run-interval-minutes: 5
    missing-capture-threshold-hours: 24
    amount-tolerance-paisa: 100
  jwt:
    secret: ${JWT_SECRET:change_me_to_a_random_32_plus_character_secret}
    expiry-hours: 24
  encryption:
    key: ${APP_ENCRYPTION_KEY:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=}
  polling:
    gap-filler-interval-minutes: 15
    gap-filler-lookback-minutes: 30
    settlement-reconciler-cron: "0 0 2 * * *"
  order-matching:
    payment-grace-minutes: 30
    order-grace-minutes: 15
    amount-tolerance-paisa: 100
  bank-matching:
    amount-tolerance-paisa: 500
    unmatched-entry-grace-hours: 48
    overdue-settlement-days: 7
  oms:
    polling-interval-minutes: ${OMS_POLLING_INTERVAL:15}
    lookback-minutes: ${OMS_LOOKBACK_MINUTES:30}
    payment-grace-minutes: ${OMS_PAYMENT_GRACE_MINUTES:1440}
    zoho:
      token-url: ${ZOHO_TOKEN_URL:https://accounts.zoho.com/oauth/v2/token}
      api-base-url: ${ZOHO_API_BASE_URL:https://www.zohoapis.com}
      # Zoho Inventory scope: ZohoInventory.salesorders.READ
      # Zoho Books scope:     ZohoBooks.customerpayments.READ
    shopify:
      api-version: ${SHOPIFY_API_VERSION:2024-01}
      client-id: ${SHOPIFY_CLIENT_ID:}
      client-secret: ${SHOPIFY_CLIENT_SECRET:}
      webhook-secret: ${SHOPIFY_WEBHOOK_SECRET:}
      redirect-uri: ${SHOPIFY_REDIRECT_URI:https://recon-be.onrender.com/api/v1/connections/shopify/oauth/callback}
scopes: read_orders,read_transactions
